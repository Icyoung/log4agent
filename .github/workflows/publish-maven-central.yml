name: Publish Maven Central

on:
  workflow_dispatch:
    inputs:
      component:
        description: Component to publish
        required: true
        default: all
        type: choice
        options:
          - all
          - kmp
          - android
  release:
    types: [published]

jobs:
  publish:
    runs-on: macos-latest
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Publish KMP to Maven Central
        if: ${{ github.event_name == 'release' || inputs.component == 'all' || inputs.component == 'kmp' }}
        working-directory: kmp
        run: ./gradlew :log4agent:publishAndReleaseToMavenCentral --stacktrace

      - name: Publish Android to Maven Central
        if: ${{ github.event_name == 'release' || inputs.component == 'all' || inputs.component == 'android' }}
        working-directory: android
        run: ./gradlew :log4agent:publishAndReleaseToMavenCentral --stacktrace
